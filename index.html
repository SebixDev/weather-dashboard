<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wetter Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="weather-bg-effects"></div>

    <div id="app">
        <header>
            <h2>Wetter Vorhersage</h2>
        </header>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Stadt eingeben..." spellcheck="false">
            <button id="search-button">Suchen</button>
        </div>

        <main class="main-weather">
            <img src="images/clear.png" class="weather-icon" alt="Wetter Zustand">
            <h1 id="city-name">Stadt</h1>
            <h2 id="temp-display">--°C</h2>
            <p id="description">Lade...</p>
        </main>

        <div class="right-content">
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Luftfeuchtigkeit">
                    <div class="humidity">--%</div>
                    <p>Feuchtigkeit</p>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Windgeschwindigkeit">
                    <div class="wind">-- km/h</div>
                    <p>Wind</p>
                </div>
                <div class="col">
                    <img src="images/uv.png" alt="UV Index">
                    <div id="uv-value">--</div>
                    <p>UV Index</p>
                    <div id="uv-level">Normal</div>
                </div>
            </div>

            <div class="forecast-container">
                <h3>7-Tage Prognose</h3>
                <div class="forecast-list" id="forecast-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
