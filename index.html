<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather-dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">
        <header>
            <h2>Wetter-Dashboard</h2>
        </header>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Geben Sie eine Stadt ein...">
            <button id="search-button">Search</button>
        </div>

        <main class="wetter-info">
            <img src="images/clear.png" class="weather-icon" alt="Wetter Icon">

            <h1 id="city-name">Stadt</h1>
            <p id="temp-display">--°C</p>    
            <p id="description">Wetter</p>

            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Humidity Icon">
                    <div>
                        <p class="humidity">--%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Wind Icon">
                    <div>
                        <p class="wind">-- km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
