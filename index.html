<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="weather-bg-effects">
        <div class="sun-rays"></div>
        <div class="cloud-layer layer-1"></div>
        <div class="cloud-layer layer-2"></div>
    </div>

    <div id="app">
        
        <header>
            <h2>Wetter</h2>
        </header>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Stadt eingeben..." autocomplete="off">
            <button id="search-btn">Suchen</button>
        </div>

        <div class="main-weather">
            <img src="images/clear.png" class="weather-icon" id="weather-icon" alt="Wetter Icon">
            <h1 id="temp-display">--°C</h1>
            <h2 id="city-name">--</h2>
            <p id="description">--</p>
        </div>

        <div class="right-content">
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Luftfeuchtigkeit">
                    <div class="humidity">--%</div>
                    <p>Feuchtigkeit</p>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Windgeschwindigkeit">
                    <div class="wind">-- km/h</div>
                    <p>Wind</p>
                </div>
                <div class="col">
                    <img src="images/uv.png" alt="UV Index">
                    <div id="uv-value">--</div>
                    <p>UV Index</p>
                    <div id="uv-level">Normal</div>
                </div>
            </div>

            <div class="forecast-container">
                <h3>7-Tage Prognose</h3>
                <div class="forecast-list" id="forecast-list"></div>
            </div>

            <div class="credits">
                Icons von <a href="https://icons8.com" target="_blank" rel="noopener">Icons8</a>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
